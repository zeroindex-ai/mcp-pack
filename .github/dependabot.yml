version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      mcp-sdk:
        patterns:
          - '@modelcontextprotocol/sdk'
      zod:
        patterns:
          - 'zod'
      vitest:
        patterns:
          - 'vitest'
          - '@vitest/*'
      typescript-eslint:
        patterns:
          - 'typescript-eslint'
          - '@typescript-eslint/*'

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      actions:
        patterns:
          - '*'
